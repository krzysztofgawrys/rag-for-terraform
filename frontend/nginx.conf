server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: route all unknown URLs to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache index.html so a redeploy with the same asset hashes
    # still picks up the latest bundle reference (and any future hash
    # change is honoured immediately).
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    # Hashed bundles in /assets/ can be cached aggressively — their
    # filename changes whenever content changes.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
