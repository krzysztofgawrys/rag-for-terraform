# ECS/ALB variant - static SPA only.
# ALB terminates SSL and routes API paths to the API target group directly.
# No proxy_pass, no SSL - just serve the frontend on port 80.

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root /usr/share/nginx/html;
    index index.html;

    # ALB health check
    location = /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Hashed bundles in /assets/ can be cached aggressively - their
    # filename changes whenever content changes.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;

        # Never cache index.html so deploys are picked up immediately.
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
            expires off;
        }
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
