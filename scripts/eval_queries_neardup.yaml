# Hard near-duplicate disambiguation - the core thesis under test.
#
# terraform-aws-security-group/modules/* is 58 structurally near-identical
# security-group modules; only the *service* distinguishes them (descriptions
# and variables are nearly the same). Lexical/BM25 retrieval cannot separate
# them - semantic ranking is the only signal. `top_rank: 1` demands the correct
# twin ranks FIRST in the returned sources (the embedding layer), and
# `forbidden_refs` names the most confusable sibling that must not outrank it.
#
# This measures the semantic-search layer (the `sources` seed), not the agent's
# later usage-tool disambiguation. Run against the populated KB:
#   python scripts/eval_retrieval.py --url http://localhost:8000 \
#     --token trag_<adminkey> --fixture scripts/eval_queries_neardup.yaml

- query: "security group for an Elasticsearch cluster"
  query_type: compose
  expected_refs: ["terraform-aws-security-group/modules/elasticsearch"]
  forbidden_refs: ["terraform-aws-security-group/modules/kibana"]
  top_k: 10
  top_rank: 1
  match: all
  description: "elasticsearch SG ranks #1 over the ELK siblings (kibana/logstash)"

- query: "security group for a PostgreSQL database"
  query_type: compose
  expected_refs: ["terraform-aws-security-group/modules/postgresql"]
  forbidden_refs: ["terraform-aws-security-group/modules/mysql"]
  top_k: 10
  top_rank: 1
  match: all
  description: "postgresql SG beats the other relational DBs (mysql/oracle/mssql)"

