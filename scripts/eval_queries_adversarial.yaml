# Adversarial retrieval-eval fixtures - REAL refs from the imported KB
# (terraform-aws-* public modules, Bedrock Titan-v2 1024-dim embeddings).
#
# These test ranking QUALITY (top_rank) and wrong-variant guards (forbidden_refs),
# not just recall - the baseline eval_queries.yaml passes even when the right
# module hides behind near-duplicates. See scripts/eval_scoring.py for the fields.
#
# Run against the local stack (admin token = a trag_* API key):
#   python scripts/eval_retrieval.py --url http://localhost:8000 \
#     --token trag_<adminkey> --fixture scripts/eval_queries_adversarial.yaml

# ---------------------------------------------------------------------------
# 1. EKS node-group disambiguation: the MANAGED node-group module must rank
#    near the top among self-managed / node_groups / example variants.
# ---------------------------------------------------------------------------
- query: "reusable module for an EKS managed node group running spot instances"
  query_type: compose
  expected_refs:
    - "terraform-aws-eks/modules/eks-managed-node-group"
  forbidden_refs:
    - "terraform-aws-eks/modules/self-managed-node-group"
  top_k: 8
  top_rank: 4
  match: all
  description: "managed (not self-managed) node group ranks in the top 4"

# ---------------------------------------------------------------------------
# 2. IAM near-duplicate cluster (~8 iam-assumable-role* variants look alike).
#    OIDC service-account role is correct; the SAML variant must not surface.
# ---------------------------------------------------------------------------
- query: "IAM role assumable by an EKS service account through OIDC federation"
  query_type: compose
  expected_refs:
    - "terraform-aws-iam/modules/iam-role-for-service-accounts-eks"
  forbidden_refs:
    - "terraform-aws-iam/modules/iam-assumable-role-with-saml"
  top_k: 10
  top_rank: 5
  match: all
  description: "near-dup IAM: OIDC service-account role outranks the SAML variant"

# ---------------------------------------------------------------------------
# 3. RDS: the database instance, not one of its sub-components.
# ---------------------------------------------------------------------------
- query: "managed AWS RDS relational database instance"
  query_type: compose
  expected_refs:
    - "terraform-aws-rds/."
  forbidden_refs:
    - "terraform-aws-rds/modules/db_subnet_group"
  top_k: 8
  top_rank: 3
  match: all
  description: "RDS root module ranks above its db_subnet_group sub-component"

# ---------------------------------------------------------------------------
# 4. S3: the bucket module, not the per-object sub-module.
# ---------------------------------------------------------------------------
- query: "S3 bucket with server-side encryption, versioning and public access blocked"
  query_type: compose
  expected_refs:
    - "terraform-aws-s3-bucket/."
  forbidden_refs:
    - "terraform-aws-s3-bucket/modules/object"
  top_k: 8
  top_rank: 3
  match: all
  description: "bucket module outranks the s3 object sub-module"

# ---------------------------------------------------------------------------
# 5. Karpenter: specific EKS autoscaler - intent must surface the right module.
# ---------------------------------------------------------------------------
- query: "Karpenter just-in-time node autoscaling for an EKS cluster"
  query_type: compose
  expected_refs:
    - "terraform-aws-eks/modules/karpenter"
  top_k: 8
  top_rank: 3
  match: all
  description: "karpenter module surfaces for the autoscaling intent"

# ---------------------------------------------------------------------------
# 6. VPC: core networking root module ranks first for the core intent.
# ---------------------------------------------------------------------------
- query: "AWS VPC with public and private subnets across multiple availability zones"
  query_type: compose
  expected_refs:
    - "terraform-aws-vpc/."
  top_k: 8
  top_rank: 2
  match: all
  description: "vpc root module ranks first for the core networking intent"
